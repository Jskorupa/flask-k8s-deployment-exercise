apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/component: web
spec:
  # Baseline replica count for HA; HPA is free to scale this up/down.
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # never drop capacity during a rollout
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: app
      automountServiceAccountToken: false

      # Spread pods across nodes AND zones so a single node/AZ failure
      # doesn't take the whole app down. Combined with PDB below, this
      # is the core of the HA story for a stateless web app.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: app
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: app

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: app

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: app
          # Pin to an immutable tag (or better, a digest) per deploy for
          # reproducibility — never ":latest" in a shared production cluster.
          image: registry.example.com/apps/hello-world-app:1.0.1
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
              # NOTE: no `hostPort` set — the pod is never pinned to a
              # static port on the node. External access goes through
              # the Service/Ingress only.

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # Right-sized for a trivial Flask app; tune per app based on
          # observed usage. Requests drive bin-packing/cost efficiency,
          # limits provide a safety ceiling.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 12   # allow up to 60s to come up under load

          env:
            - name: PYTHONUNBUFFERED
              value: "1"

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        # readOnlyRootFilesystem needs a writable /tmp for gunicorn/py tmp files
        - name: tmp
          emptyDir: {}

      terminationGracePeriodSeconds: 30
