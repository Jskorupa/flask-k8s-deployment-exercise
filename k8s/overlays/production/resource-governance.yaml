apiVersion: v1
kind: ResourceQuota
metadata:
  name: quota
  namespace: hello-world-app
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "3"
    limits.memory: 2Gi
    pods: "15"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: limits
  namespace: hello-world-app
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 128Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
