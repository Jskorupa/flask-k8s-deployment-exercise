apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# --- Everything below this line is what changes per new app. ---
# --- To onboard app #21, copy this overlay directory, and     ---
# --- edit: namespace, namePrefix, image tag, host, and quota. ---

namespace: hello-world-app

namePrefix: hello-world-app-

labels:
  - pairs:
      app.kubernetes.io/instance: hello-world-app
      app.kubernetes.io/part-of: platform-web-apps
    includeSelectors: false

resources:
  - ../../base
  - namespace.yaml
  - ingress.yaml
  - resource-governance.yaml

images:
  - name: registry.example.com/apps/hello-world-app
    newTag: "1.0.0"

replicas:
  - name: app
    count: 3
